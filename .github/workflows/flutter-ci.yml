name: Flutter CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  analyze-test-build-web:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: dart pub get

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Test
        run: flutter test --no-pub

      - name: Build web
        run: flutter build web --no-pub --no-web-resources-cdn
